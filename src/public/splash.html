<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Refloow GeoForensics</title>
    <!-- I used css inside of the file instead in the styles.css here becuase i want this to be portable and likely used in other electron apps -->
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            border: none;
            box-sizing: border-box;
        }
        .splash-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-img {
            width: 240px;
            height: auto;
            animation: pulse 1.2s infinite;
            margin-bottom: 50px;
            will-change: transform, opacity;
        }
        .loading-text {
            font-size: 1rem;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .loader-bar {
            width: 150px;
            height: 2px;
            background-color: #333;
            margin-top: 15px; 
            overflow: hidden;
            border-radius: 2px;
        }
        .loader-progress {
            width: 50%;
            height: 100%;
            background-color: #4442ec;
            animation: slide 1.4s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <img src="../img/RefloowLogo.png" alt="Refloow Logo" class="logo-img">
        <div class="loading-text">loading...</div>
        
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>
</body>
</html>
